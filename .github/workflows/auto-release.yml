name: Auto Release – Ruby SDK (Child-B)
 
on:
  pull_request:
    types: [closed]
    branches:
      - master
 
permissions:
  contents: write
 
jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: PAT
 
    steps:
      # -------------------------------------------------
      # Require "release: yes"
      # -------------------------------------------------
     - name: Check release intent
       id: check
       uses: actions/github-script@v6
       with:
         github-token: ${{ secrets.PAT }}
         script: |
           const commit = await github.rest.git.getCommit({
             owner: context.repo.owner,
             repo: context.repo.repo,
             commit_sha: context.payload.pull_request.merge_commit_sha
           });
           const message = commit.data.message;
           const isRelease = /release:\s*yes/i.test(message);
           core.setOutput('release', isRelease ? 'true' : 'false');
       
            - name: Stop if not a release
              if: steps.check.outputs.release == 'false'
              run: exit 0
 
      # -------------------------------------------------
      # Checkout merged code
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
 
      # -------------------------------------------------
      # Read version (authoritative source)
      # -------------------------------------------------
      - name: Read version from gemspec
        run: |
          VERSION=$(ruby -e "
            spec = Gem::Specification.load('wysiwyg-editor-ruby-sdk.gemspec')
            puts spec.version
          ")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Releasing version: $VERSION"
 
      # -------------------------------------------------
      # Setup Ruby
      # -------------------------------------------------
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
 
      # -------------------------------------------------
      # Build gem (matches Froala docs)
      # -------------------------------------------------
      - name: Build gem
        run: |
          gem build wysiwyg-editor-ruby-sdk.gemspec
 
      # -------------------------------------------------
      # Push gem to RubyGems (OFFICIAL STEP)
      # -------------------------------------------------
      - name: Publish to RubyGems
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          mkdir -p ~/.gem
          echo ":rubygems_api_key: $RUBYGEMS_API_KEY" > ~/.gem/credentials
          chmod 600 ~/.gem/credentials
 
          gem push froala-editor-sdk-${VERSION}.gem
 
      # -------------------------------------------------
      # Create GitHub Release (NO auto notes)
      # -------------------------------------------------
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          # Prevent duplicate releases
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "ℹ️ Release v${VERSION} already exists. Skipping."
            exit 0
          fi

          gh release create "v${VERSION}" \
            --title "Release ${VERSION}" \
            --notes "$RELEASE_NOTES" \
            --latest
